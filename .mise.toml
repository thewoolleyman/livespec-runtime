# livespec-runtime — developer-tooling pins (non-Python binaries only).
#
# Authority: livespec/SPECIFICATION/non-functional-requirements.md
#   §"Toolchain pins" — non-Python binaries (uv, just, lefthook) pin via
#   .mise.toml; Python interpreter + Python packages pin via uv against
#   pyproject.toml's [project.requires-python] + [dependency-groups.dev].
#
# Pins mirror livespec-core's .mise.toml exactly so every livespec-governed
# repo uses identical tool versions. Drift between this file and livespec-
# core's .mise.toml is tracked manually until templates/library/ is
# extracted (see livespec work-item li-fgqgnk Phase G's follow-up).

[tools]
uv       = "0.5.20"
just     = "1.36.0"
lefthook = "1.13.6"
