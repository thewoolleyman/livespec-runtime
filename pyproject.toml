# pyproject.toml — livespec-runtime.
#
# Authority for every rule expressed here is the live specification at
# livespec/SPECIFICATION/ (notably non-functional-requirements.md
# §"Toolchain pins", §"Shared content provenance", §"Linter rule set",
# §"Typechecker rule set", §"Code coverage thresholds") plus this
# library's own SPECIFICATION/ tree once seeded at Phase G.3 of epic
# li-fgqgnk.
#
# This file is HAND-AUTHORED (not generated from copier). The epic
# YAGNI'd templates/library/ until a second library variant appears;
# when it does, a future propose-change cycle MAY extract this file's
# common shape into a templates/library/pyproject.toml.jinja.
#
# Has a [build-system] section: livespec-runtime IS installable
# (consumed by every livespec-governed repo via uv git source per
# livespec/SPECIFICATION/contracts.md §"Shared code sync —
# livespec-runtime").

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "livespec-runtime"
version = "0.11.0"
description = "Shared runtime library for livespec-governed projects: cross-repo dependency resolution, retry policy, runtime types consumed by canonical livespec skills and impl-plugin consumers. Sibling to livespec, livespec-impl-*, and livespec-dev-tooling (which owns enforcement-suite code)."
requires-python = ">=3.10.16"
authors = [
    { name = "Chad Woolley", email = "thewoolleyman@gmail.com" },
]
license = { text = "MIT" }
readme = "README.md"

# Runtime dependencies at v0.2.0 (li-aclzfe impl):
#
# - `typing_extensions` is the SOLE Python runtime dependency, needed
#   for `typing_extensions.assert_never` under the >=3.10.16 floor
#   (`typing.assert_never` is 3.11+). Used by
#   `livespec_runtime.cross_repo.resolve` to enforce exhaustivity of
#   the `DependsOnEntry` match.
#
# - `gh` CLI is a SYSTEM dependency, not a Python package. Invoked via
#   subprocess from `livespec_runtime.cross_repo.providers.github`.
#   Consumers MUST install `gh` and run `gh auth status` successfully
#   before invoking the cross-repo resolve walk.
#
# - Retry policy is hand-rolled (no tenacity), kept in
#   `livespec_runtime.cross_repo.retry` for zero transitive pin cost
#   on consumers.
dependencies = [
    "typing_extensions>=4.4.0",
]

# The `git credential` helper entry point (github_auth): installing this
# library places the script on the consumer venv's PATH; consumers wire it
# as `git config credential.helper '!livespec-github-credential-helper'`.
[project.scripts]
livespec-github-credential-helper = "livespec_runtime.github_auth.credential_helper:run"
livespec-hygiene-scan = "livespec_runtime.hygiene_scan:run"

[tool.hatch.build.targets.wheel]
packages = ["livespec_runtime"]

[dependency-groups]
# Every Python dev tool is uv-managed via this table (resolved into
# uv.lock; installed into a project-local .venv via
# `uv sync --all-groups`). Mise pins only the non-Python binaries
# in .mise.toml. Versions mirror livespec-core's pins exactly per
# livespec/SPECIFICATION/non-functional-requirements.md
# §"Shared content provenance".
dev = [
    "ruff==0.8.6",
    "pyright==1.1.391",
    "pytest==8.3.4",
    "pytest-cov==6.0.0",
    "pytest-icdiff==0.9",
    "pytest-xdist==3.8.0",
    "hypothesis==6.122.3",
    "hypothesis-jsonschema==0.23.1",
    "mutmut==3.2.3",
    "import-linter==2.1",
    "livespec-dev-tooling",
]

# livespec-dev-tooling is consumed from the github.com sibling-library
# repo via uv git source per
# livespec/SPECIFICATION/contracts.md §"Shared code sync —
# livespec-dev-tooling". The library's semver-stable surface is the
# `python -m livespec_dev_tooling.checks.<slug>` invocation set (each
# slug's argv contract and exit-code semantics). Bump-pin PRs against
# this repo land each new tag per livespec/SPECIFICATION/contracts.md
# §"Cross-repo coordination — pin-and-bump". v0.5.0 flips the
# primary-checkout invariant from `core.bare = true` to the
# commit-refuse hook installed at .git/hooks/pre-commit and
# .git/hooks/pre-push; the new check slug
# `primary_checkout_commit_refuse_hook_installed` replaces
# `primary_checkout_bare_flag_set` in the canonical aggregate
# (epic li-unbare Phase 3, work-item li-unbarrun). v0.9.0 adds the
# two canonical checks `skill_invocation_paths` and
# `tool_backed_check_completeness`, and activates the
# require-granular-scenarios + scenario-tier rule in
# `heading_coverage` (epic li-scetier; the `scenario_tiers` allowlist
# below + the `tests/heading-coverage.json` scenario entries land in
# the same PR, work-item li-scetrn).
[tool.uv.sources]
livespec-dev-tooling = { git = "https://github.com/thewoolleyman/livespec-dev-tooling.git", tag = "v0.50.5" }

# Consumer-declared layout config consumed by the shared
# livespec-dev-tooling checks (per livespec-dev-tooling
# SPECIFICATION/contracts.md §"Consumer configuration schema"). Only
# the keys runtime's layout actually needs are declared; omitted role
# keys make the corresponding check no-op against this consumer.
#
# `scenario_tiers` is the node-id-prefix allowlist the `heading_coverage`
# check (v0.9.0+) accepts as integration-tier-or-above for
# `SPECIFICATION/scenarios.md` headings. Runtime's scenarios are
# exercised by the consumer-style top-of-pyramid tier under
# `tests/consumer/` (node-id prefix `tests.consumer`); `tests.e2e` is
# listed for forward room should an e2e tier be added.
[tool.livespec_dev_tooling]
# Phase-2 file_lloc FLIP (fleet-check-coverage epic livespec-i5ebqd, track
# livespec-8x7d). With this key true, `file_lloc` hard-gates this repo's WHOLE
# git-derived first-party-.py universe (>250 LLOC => error/exit 1) instead of
# WARN-only. Safe to arm: the Phase-1 burndown brought every runtime .py under
# the ceiling (verified: `check-file-lloc` exits 0 with the gate armed, zero
# files >250); a 201-250 file still WARNs (soft band), a >250 file fails. This
# is a SEVERITY increase, never a bypass (per livespec .ai/ci-gate-discipline.md
# and the fleet-check-coverage golden rules). Requires livespec-dev-tooling >=
# v0.39.0 (the flip lever; this repo is pinned at v0.39.0 above).
file_lloc_hard_gate = true
scenario_tiers = ["tests.consumer", "tests.e2e"]

# ---------------------------------------------------------------------------
# Ruff — sole linter, formatter, import-sorter, complexity checker.
# Rule set mirrors livespec/pyproject.toml [tool.ruff] per
# livespec/SPECIFICATION/non-functional-requirements.md §"Linter rule set".
# ---------------------------------------------------------------------------

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [".claude/hooks/**", "**/_vendor/**", "**/__pycache__/**", "mutants/**", "livespec_runtime/work_items/_fractional_indexing.py"]

[tool.ruff.lint]
# 27 categories: v011 baseline (11) + v012 additions (16). Per
# livespec/SPECIFICATION/non-functional-requirements.md §"Linter rule set".
select = [
    # ----- v011 baseline (11 categories) -----
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "SIM",   # flake8-simplify
    "C90",   # mccabe complexity
    "N",     # pep8-naming
    "RUF",   # ruff-specific
    "PL",    # pylint
    "PTH",   # flake8-use-pathlib
    # ----- v012 additions (16 categories) -----
    "TRY",   # tryceratops — pairs with K10 domain-vs-bugs split
    "FBT",   # flake8-boolean-trap — reinforces K4 keyword-only discipline
    "PIE",   # flake8-pie — miscellaneous anti-patterns
    "SLF",   # flake8-self — bans cross-class _-prefixed access
    "LOG",   # flake8-logging — logging discipline
    "G",     # flake8-logging-format — kwargs-only in log calls
    "TID",   # flake8-tidy-imports — no relative imports + banned-imports
    "ERA",   # eradicate — bans commented-out code (LLM artifact)
    "ARG",   # flake8-unused-arguments
    "RSE",   # flake8-raise — `raise X` over `raise X()`; raise...from discipline
    "PT",    # flake8-pytest-style
    "FURB",  # refurb — modern-Python refactor hints
    "SLOT",  # flake8-slots
    "ISC",   # flake8-implicit-str-concat — complements pyright
    "T20",   # flake8-print — bans print/pprint
    "S",     # flake8-bandit — security anti-patterns
]
ignore = [
    "ISC001",  # implicit-str-concat on one line; conflicts with the formatter
]

[tool.ruff.lint.pylint]
max-args = 6
max-positional-args = 6
max-branches = 10
max-statements = 30

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"abc.ABC" = { msg = "use typing.Protocol" }
"abc.ABCMeta" = { msg = "use typing.Protocol" }
"abc.abstractmethod" = { msg = "use typing.Protocol" }
"pickle" = { msg = "arbitrary-code-execution surface on load(); use JSON / JSONC" }
"marshal" = { msg = "arbitrary-code-execution surface on load(); use JSON / JSONC" }
"shelve" = { msg = "arbitrary-code-execution surface on load(); use JSON / JSONC" }

[tool.ruff.lint.per-file-ignores]
# pytest conventions: bare assert, magic literals in assertions,
# subprocess.run with fixed argv lists, composite assertions,
# /tmp paths, token-suffixed variable names, long descriptive
# docstrings, many-arg pytest fixtures. Mirrors livespec-core's
# tests/ per-file-ignore set.
"tests/**.py" = [
    "S101", "PLR2004", "S603", "S607", "PT018", "S108", "S105", "TRY003", "E501", "PLR0913",
]
# Cross-repo modules will shell out to `gh` and `git` via subprocess.run
# with fixed argv lists per the providers.github contract; S603/S607/S404
# are over-strict for this documented pattern.
"livespec_runtime/cross_repo/**.py" = ["S603", "S607", "S404"]
# The github_auth signer shells out to `openssl` via subprocess.run with a
# fixed argv list (the RS256 production signer); same documented pattern as
# cross_repo above.
"livespec_runtime/github_auth/**.py" = ["S603", "S607", "S404"]
"livespec_runtime/hygiene_scan*.py" = ["S603", "S607", "S404"]

# ---------------------------------------------------------------------------
# Pyright — strict + seven strict-plus diagnostics. Per
# livespec/SPECIFICATION/non-functional-requirements.md §"Typechecker rule set".
# ---------------------------------------------------------------------------

[tool.pyright]
include = ["livespec_runtime"]
exclude = ["**/_vendor/**", "**/__pycache__/**", "livespec_runtime/work_items/_fractional_indexing.py"]
pythonVersion = "3.10"
typeCheckingMode = "strict"

reportUnusedCallResult = "error"
reportImplicitOverride = "error"
reportUninitializedInstanceVariable = "error"
reportUnnecessaryTypeIgnoreComment = "error"
reportUnnecessaryCast = "error"
reportUnnecessaryIsInstance = "error"
reportImplicitStringConcatenation = "error"

# ---------------------------------------------------------------------------
# Pytest — pytest-cov + pytest-icdiff wiring.
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = [
    "--strict-markers",
    "--strict-config",
    # `--import-mode=importlib` lets paired tests share a basename
    # across mirror trees without pytest's legacy `prepend` mode
    # triggering same-basename module collisions.
    "--import-mode=importlib",
]

# ---------------------------------------------------------------------------
# Coverage — 100% line + branch (per livespec/SPECIFICATION/
# non-functional-requirements.md §"Code coverage thresholds").
# ---------------------------------------------------------------------------

[tool.coverage.run]
branch = true
# Coverage uses an `omit`-only blocklist (no `source` allowlist).
# Subprocess-driven tests (in particular the cross_repo provider tests
# that spawn `gh`/`git` children) require pytest-cov's pth-installed
# startup hook to instrument the children; a relative `source` list
# resolves against the subprocess's cwd, so dropping `source` entirely
# lets every imported module be measured, then the `omit` patterns
# below filter out everything that isn't first-party livespec-runtime
# code. Same approach as livespec-core and livespec-dev-tooling.
omit = [
    "*/_vendor/*",
    "*/.venv/*",
    "*/site-packages/*",
    "*/__pycache__/*",
    "/tmp/*",
    "/private/var/folders/*",
    "mutants/*",
    # Verbatim CC0 third-party port (decision 38, G-1) — carried
    # source-only in the first-party tree (no `_vendor/` machinery in
    # livespec_runtime), excluded from the lint/type/coverage gates like
    # any vendored code. Exercised through the `rank.py` wrapper, which
    # IS covered.
    "*/work_items/_fractional_indexing.py",
]

[tool.coverage.report]
# 100% line + branch — livespec-runtime starts with the empty
# cross_repo skeleton (li-ufvfmb) so the threshold is trivially
# met at v0.1.0; subsequent releases adding modules MUST keep it
# at 100 per the same discipline as livespec-core.
fail_under = 100
show_missing = true
skip_covered = false
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "raise ImportError",
    "@overload",
    # Main guard — never executed via pytest; covered by the meta-
    # test pattern where applicable.
    "if __name__ == .__main__.:",
    # Vendored-path guard — `if str(X) not in sys.path: sys.path.insert(...)`.
    # Already in sys.path when tests run via pyproject.toml `pythonpath`
    # config; the sys.path.insert branch is structurally dead in tests.
    # Matches the livespec-core exclusion pattern.
    "sys.path.insert",
    # `case _:` arms are structurally unreachable by spec mandate:
    # every `match` statement terminates with `case _: assert_never(...)`.
    # The arm is therefore unreachable when the subject's declared
    # type is exhaustively handled by the prior arms.
    "case _:",
]
