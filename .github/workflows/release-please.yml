# release-please.yml — semver-managed releases via Conventional Commits.
#
# Authority: livespec/SPECIFICATION/contracts.md §"Plugin versioning"
#   — the documented mechanism is release-please from per-commit
#   Conventional Commits via the release-please-action GitHub Action.
#   The same mechanism applies to this sibling library; livespec-core
#   has not yet wired its own release-please.yml as of v070, and
#   livespec-runtime is the first livespec-governed repo to do so.
#
# Behavior: on every push to master, release-please opens (or updates)
# a release PR carrying the next-version bump per Conventional
# Commits → semver mapping:
#
#   feat:                                   → MINOR
#   fix:                                    → PATCH
#   feat!:, fix!:, BREAKING CHANGE: footer  → MAJOR
#   chore, docs, style, refactor, perf,     → no bump
#   test, build, ci, revert
#
# When the release PR merges, release-please tags vX.Y.Z and creates
# a GitHub Release. Phase G.5 of epic li-fgqgnk cuts the first v0.1.0
# tag this way.
#
# Auth model (WI-A, work-item livespec-runtime-emz):
#   release-please MUST authenticate via the livespec GitHub App
#   installation token, NOT the default `GITHUB_TOKEN`. A release PR
#   authored by `github-actions[bot]` (i.e. via `GITHUB_TOKEN`) does
#   NOT get its workflows auto-run: the PR's `pull_request` CI run is
#   parked `action_required` with zero jobs, so the branch-protection
#   required status checks never report and the PR sits BLOCKED (the
#   fork-only `…/actions/runs/<id>/approve` endpoint does not apply;
#   the only manual unblock is close+reopen as a human actor). Bot-token
#   authorship also suppresses the `release: published` event that
#   `release-dispatch.yml` relies on for cross-repo fan-out. An App
#   installation token restores BOTH: ungated CI on the release PR and
#   the published-release fan-out event. The same App identity (secrets
#   APP_ID + APP_PRIVATE_KEY) already backs this repo's bump-pin flow.
#   Mirrors the proven pattern in
#   livespec-dev-tooling/.github/workflows/release-please.yml.

name: Release Please

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
